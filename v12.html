      name="twitter:description"
      content="DosCode v12: сайты, лендинги, интернет-магазины, приложения и MVP для бизнеса в Казахстане."
    />
    <meta name="twitter:image" content="https://doscode.kz/v10/opengraph.jpg" />
    <meta name="twitter:image:alt" content="DosCode — разработка сайтов и цифровых продуктов для бизнеса в Казахстане" />
    <meta name="theme-color" content="#f5f1e6" id="themeColorMeta" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <script>
      (function () {
        var root = document.documentElement;
        var defaultLang = "ru";

        try {
          var storedLang = null;
          try {
            storedLang = localStorage.getItem("doscode-lang");
          } catch (e) {
            storedLang = null;
          }

          var lang = storedLang === "ru" || storedLang === "kk" || storedLang === "en" ? storedLang : defaultLang;
          root.lang = lang;
          root.dataset.lang = lang;

          var storedTheme = null;
          try {
            storedTheme = localStorage.getItem("doscode-v10-theme");
          } catch (e) {
            storedTheme = null;
          }

          var theme = storedTheme === "dark" ? "dark" : "light";
          root.classList.toggle("v10-light", theme === "light");
          root.classList.toggle("dark", theme !== "light");
          root.dataset.theme = theme;
          root.style.colorScheme = theme === "light" ? "light" : "dark";

          var meta = document.getElementById("themeColorMeta");
          if (meta) {
            meta.setAttribute("content", theme === "light" ? "#f5f1e6" : "#0a0a0d");
          }
        } catch (e) {
          root.lang = defaultLang;
          root.dataset.lang = defaultLang;
          root.classList.add("v10-light");
          root.dataset.theme = "light";
          root.style.colorScheme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>Please enable JavaScript to view this site.</noscript>
    <script type="module" src="/src/v12/main.tsx"></script>
  </body>
